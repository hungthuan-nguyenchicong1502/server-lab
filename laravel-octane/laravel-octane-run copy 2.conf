server {
    listen 80;
    server_name hungthuan.com;

    # Tắt log để tập trung nhìn terminal cho nhanh
    access_log off;
    error_log /var/log/nginx/octane_test.error.log error;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Hỗ trợ Websocket cho Octane
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # TRỎ THẲNG TỚI CONTAINER OCTANE
        # Phải có http:// và đúng port 1000 bạn đã test thành công
        proxy_pass http://laravel-octane-alpine-ncc:1000;
    }
}