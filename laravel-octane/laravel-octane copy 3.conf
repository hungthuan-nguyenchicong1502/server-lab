server {
    listen 80;
    server_name hungthuan.com;

    root /var/www/html/laravel-app/public;
    index index.php;

    charset utf-8;

    # Cấu hình để xử lý file tĩnh trước, nếu không có mới đẩy vào Octane
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Chặn các file ẩn như .ht, .git
    location ~ /\. {
        deny all;
    }

    # Xử lý PHP thông qua Octane (Proxy)
    location = /index.php {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Hỗ trợ Websocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_pass http://laravel-octane-alpine-ncc:1000;
    }

    # Nếu bạn muốn dùng trực tiếp named location như cũ (@octan)
    location @octan {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_pass http://laravel-octane-alpine-ncc:1000;
    }
}